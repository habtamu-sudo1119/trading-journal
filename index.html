<!DOCTYPE html>
<html>
<head>
<title>Professional Forex Trading Journal</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
padding:20px;
}

h1{
text-align:center;
}

.stats{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
width:180px;
text-align:center;
}

input,select,textarea,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:5px;
border:none;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:white;
color:black;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

img{
width:100px;
}
</style>

</head>

<body>

<h1>📈 Professional Forex Trading Journal</h1>

<div class="stats">

<div class="card">
<h2 id="totalTrades">0</h2>
<p>Total Trades</p>
</div>

<div class="card">
<h2 id="wins">0</h2>
<p>Wins</p>
</div>

<div class="card">
<h2 id="losses">0</h2>
<p>Losses</p>
</div>

<div class="card">
<h2 id="winRate">0%</h2>
<p>Win Rate</p>
</div>

<div class="card">
<h2 id="balance">$1000</h2>
<p>Balance</p>
</div>

</div>

<h2>Add Trade</h2>

<input type="date" id="date">

<input type="text" id="pair" placeholder="Pair (EURUSD)">

<input type="number" id="profit" placeholder="Profit/Loss ($)">

<input type="number" id="rr" placeholder="Risk Reward">

<select id="result">
<option>Win</option>
<option>Loss</option>
</select>

<textarea id="notes" placeholder="Trade Notes"></textarea>

<input type="file" id="screenshot">

<button onclick="addTrade()">Add Trade</button>

<h2>Trade History</h2>

<table id="tradeTable">

<thead>
<tr>
<th>Date</th>
<th>Pair</th>
<th>P/L</th>
<th>RR</th>
<th>Result</th>
<th>Notes</th>
<th>Screenshot</th>
<th>Delete</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

let totalTrades=0;
let wins=0;
let losses=0;
let balance=1000;

function addTrade(){

let date=document.getElementById("date").value;
let pair=document.getElementById("pair").value;
let profit=parseFloat(document.getElementById("profit").value);
let rr=document.getElementById("rr").value;
let result=document.getElementById("result").value;
let notes=document.getElementById("notes").value;
let file=document.getElementById("screenshot").files[0];

if(!date  !pair  isNaN(profit)){
alert("Fill all fields");
return;
}

totalTrades++;

if(result==="Win"){
wins++;
}else{
losses++;
}

balance+=profit;

let winRate=((wins/totalTrades)*100).toFixed(1);

document.getElementById("totalTrades").innerText=totalTrades;
document.getElementById("wins").innerText=wins;
document.getElementById("losses").innerText=losses;
document.getElementById("winRate").innerText=winRate+"%";
document.getElementById("balance").innerText="$"+balance;

let table=document.querySelector("#tradeTable tbody");

let row=table.insertRow();

row.insertCell(0).innerText=date;
row.insertCell(1).innerText=pair;
row.insertCell(2).innerText="$"+profit;
row.insertCell(3).innerText=rr;
row.insertCell(4).innerText=result;
row.insertCell(5).innerText=notes;

let imgCell=row.insertCell(6);

if(file){

let reader=new FileReader();

reader.onload=function(e){

imgCell.innerHTML=
'<img src="'+e.target.result+'">';

}

reader.readAsDataURL(file);

}

let deleteCell=row.insertCell(7);

let btn=document.createElement("button");

btn.innerText="Delete";

btn.onclick=function(){

row.remove();

};

deleteCell.appendChild(btn);

}

</script>

</body>
</html>
