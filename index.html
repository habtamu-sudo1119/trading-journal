<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal Pro FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
padding:15px;
text-align:center;
background:#111827;
font-weight:bold;
font-size:18px;
}

.nav{
display:flex;
gap:5px;
padding:10px;
background:#0f172a;
}

.nav button{
flex:1;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#1e293b;
color:white;
}

.nav button.active{
background:#22c55e;
}

.container{padding:15px; max-width:1000px; margin:auto;}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:6px;
}

button{
padding:10px;
width:100%;
margin-top:6px;
border:none;
border-radius:6px;
cursor:pointer;
background:#22c55e;
color:white;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
padding:8px;
border-bottom:1px solid #334155;
text-align:center;
}

img{
width:45px;
height:45px;
border-radius:6px;
object-fit:cover;
}

.hidden{display:none;}

.stat-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.stat{
background:#334155;
padding:10px;
border-radius:8px;
text-align:center;
}
</style>
</head>

<body>

<header>📊 Trading Journal FINAL PRO</header>

<div class="nav">
<button class="active" onclick="showTab('journal')">Journal</button>
<button onclick="showTab('stats')">Stats</button>
<button onclick="showTab('chart')">Chart</button>
</div>

<div class="container">

<!-- JOURNAL -->
<div id="journal">

<div class="card">
<h3>Add Trade</h3>

<input id="pair" placeholder="Pair (EURUSD)">
<input id="entry" type="number" placeholder="Entry">
<input id="exit" type="number" placeholder="Exit">

<select id="type">
<option>Win</option>
<option>Loss</option>
<option>Break Even</option>
<option>Missed</option>
</select>

<input type="file" id="img">

<button onclick="addTrade()">Add Trade</button>
<button onclick="resetAll()" style="background:#ef4444">Reset All</button>
</div>

<div class="card">
<h3>History</h3>
<table>
<thead>
<tr>
<th>Pair</th>
<th>Type</th>
<th>P/L</th>
<th>Img</th>
<th>Del</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div id="empty" style="text-align:center;opacity:0.6;margin-top:10px;"></div>
</div>

</div>

<!-- STATS -->
<div id="stats" class="hidden">
<div class="card">
<h3>Stats</h3>

<div class="stat-grid">
<div class="stat">Trades<br><span id="total">0</span></div>
<div class="stat">Wins<br><span id="wins">0</span></div>
<div class="stat">Loss<br><span id="losses">0</span></div>
<div class="stat">Net P/L<br><span id="net">0</span></div>
</div>

</div>
</div>

<!-- CHART -->
<div id="chart" class="hidden">
<div class="card">
<h3>Equity Curve</h3>
<canvas id="c"></canvas>
</div>
</div>

</div>

<script>
let trades = JSON.parse(localStorage.getItem("trades")) || [];

function save(){
localStorage.setItem("trades", JSON.stringify(trades));
}

function calc(entry,exit){
if(!entry||!exit) return 0;
return exit-entry;
}

function addTrade(){
let pair=document.getElementById("pair").value;
let entry=parseFloat(document.getElementById("entry").value);
let exit=parseFloat(document.getElementById("exit").value);
let type=document.getElementById("type").value;
let file=document.getElementById("img").files[0];

if(!pair) return alert("Enter pair");

let profit = calc(entry,exit);
if(type==="Missed"||type==="Break Even") profit=0;

let reader=new FileReader();

reader.onload=function(e){

trades.push({
pair,entry,exit,type,profit,
img:e.target.result||""
});

save();
render();
};

if(file) reader.readAsDataURL(file);
else reader.onload({target:{result:""}});
}

function deleteTrade(i){
trades.splice(i,1);
save();
render();
}

function resetAll(){
if(confirm("Delete all trades?")){
trades=[];
save();
render();
}
}

function render(){let t=document.getElementById("table");
t.innerHTML="";

let wins=0,loss=0,net=0;

if(trades.length===0){
document.getElementById("empty").innerText="No trades yet...";
}else{
document.getElementById("empty").innerText="";
}

let equity=[];

trades.forEach((x,i)=>{
net+=x.profit;
equity.push(net);

if(x.type==="Win") wins++;
else if(x.type==="Loss") loss++;

t.innerHTML+=
<tr>
<td>${x.pair}</td>
<td>${x.type}</td>
<td>${x.profit}</td>
<td>${x.img?<img src="${x.img}">:"-"}</td>
<td><button onclick="deleteTrade(${i})">X</button></td>
</tr>;
});

document.getElementById("total").innerText=trades.length;
document.getElementById("wins").innerText=wins;
document.getElementById("losses").innerText=loss;
document.getElementById("net").innerText=net.toFixed(2);

draw(equity);
}

let chart;

function draw(data){
if(chart) chart.destroy();

chart=new Chart(document.getElementById("c"),{
type:"line",
data:{
labels:data.map((_,i)=>i+1),
datasets:[{
data:data,
borderColor:"#22c55e",
fill:false
}]
}
});
}

function showTab(tab){
document.getElementById("journal").classList.add("hidden");
document.getElementById("stats").classList.add("hidden");
document.getElementById("chart").classList.add("hidden");

document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));

if(tab==="journal") document.querySelectorAll(".nav button")[0].classList.add("active");
if(tab==="stats") document.querySelectorAll(".nav button")[1].classList.add("active");
if(tab==="chart") document.querySelectorAll(".nav button")[2].classList.add("active");

document.getElementById(tab).classList.remove("hidden");
}

render();
</script>

</body>
</html>
